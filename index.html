<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon 2026 - Diamante Engine con Playlist y Carátulas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #030508;
            --panel-glass: rgba(12, 16, 26, 0.75);
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --diamond-silver: #f8fafc;
            --border-glow: rgba(255, 255, 255, 0.18);
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 10%, rgba(79, 172, 254, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 90%, rgba(0, 242, 254, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.05) 0%, transparent 40%);
            font-family: 'Montserrat', sans-serif;
            color: var(--diamond-silver);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 950px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .neon-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .neon-logo-icon {
            font-size: 2.2rem;
            color: var(--neon-cyan);
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
            margin-bottom: 8px;
            animation: floatGlow 3s ease-in-out infinite;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(0,242,254,0.4)); }
            50% { transform: translateY(-5px); filter: drop-shadow(0 0 22px rgba(0,242,254,0.8)); }
        }

        .neon-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ffffff 20%, #93c5fd 50%, #00f2fe 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 242, 254, 0.25);
            margin: 0;
            text-transform: uppercase;
        }

        .neon-subtitle {
            font-size: 0.85rem;
            color: #64748b;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 8px;
            font-weight: 600;
        }

        .player-card {
            width: 100%;
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.15),
                        0 0 25px rgba(0, 242, 254, 0.08);
            position: relative;
            margin-bottom: 30px;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .input-row {
            display: flex;
            gap: 15px;
        }

        .url-field, .name-field, .img-field {
            background: rgba(3, 5, 8, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 14px 20px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .name-field, .img-field {
            flex: 1;
        }

        .url-field {
            flex: 2;
        }

        .url-field:focus, .name-field:focus, .img-field:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.25);
            background: rgba(3, 5, 8, 0.95);
        }

        .btn-container {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-cyan) 100%);
            color: #030508;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.4);
            text-transform: uppercase;
        }

        .save-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .action-btn:hover, .save-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .video-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 8px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .status-bar {
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: #94a3b8;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Lista de Reproducción con Miniaturas / Carátulas */
        .playlist-card {
            width: 100%;
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .playlist-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .playlist-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .playlist-items::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-items::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 10px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 5, 8, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 14px;
            border-radius: 12px;
            transition: all 0.25s ease;
        }

        .playlist-item:hover {
            border-color: rgba(0, 242, 254, 0.4);
            background: rgba(3, 5, 8, 0.9);
        }

        .playlist-item.active {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 254, 0.1);
        }

        .playlist-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .playlist-item-thumb {
            width: 65px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #111;
        }

        .playlist-item-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        .playlist-item-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item-url {
            font-size: 0.75rem;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 320px;
        }

        .playlist-actions {
            display: flex;
            gap: 8px;
        }

        .item-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .item-btn.play-item {
            color: var(--neon-cyan);
        }
        .item-btn.play-item:hover {
            background: var(--neon-cyan);
            color: #030508;
        }

        .item-btn.delete-item:hover {
            background: #ef4444;
            color: #fff;
        }

        .author-footer {
            width: 100%;
            text-align: center;
            padding: 25px 0;
            font-size: 0.85rem;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
        }

        .author-footer span {
            color: var(--neon-cyan);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        @media (max-width: 768px) {
            .neon-title { font-size: 2.2rem; letter-spacing: 3px; }
            .input-row { flex-direction: column; }
            .btn-container { flex-direction: column; }
            .action-btn { width: 100%; justify-content: center; }
            .playlist-item-url { max-width: 150px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="neon-header">
            <div class="neon-logo-icon"><i class="fa-solid fa-gem"></i></div>
            <h1 class="neon-title">NEON 2026</h1>
            <div class="neon-subtitle">Diamond Stream Engine</div>
        </div>

        <div class="player-card">
            <div class="input-group">
                <div class="input-row">
                    <input type="text" id="nameInput" class="name-field" placeholder="Nombre del video (ej. Mi Stream)...">
                    <input type="text" id="imgInput" class="img-field" placeholder="URL de la Carátula (Imagen opcional)...">
                </div>
                <div class="input-row">
                    <input type="text" id="urlInput" class="url-field" placeholder="Enlace multimedia (.mp4 o .m3u8)..." value="https://ugc-cdn-caching-n3tczjg8qagalxt0nj.cloudwindow-route.com/engine/hls2-c/01/17435/fhprk8lwj75l_,n,.urlset/index-v1-a1.m3u8?t=jjtSee447E2lb3JjCAH8vLT2-B-rCUvcbtw36oSVEeg&s=1784245452&e=14400&f=88082469&node=xILxAyNY9tqF6GBGyevCJqu4WPp7c2KRS9FeOJ8rLAg=&i=45.233&sp=2500&asn=266816&q=n&rq=uU2GG5DCceh6ova0eR9SMD9VfLtuw7pFVZ3W9hI1">
                </div>
                <div class="btn-container">
                    <button class="action-btn" type="button" onclick="cargarVideoDesdeInput()">
                        <i class="fa-solid fa-play"></i> Reproducir Ahora
                    </button>
                    <button class="action-btn save-btn" type="button" onclick="guardarEnPlaylist()">
                        <i class="fa-solid fa-bookmark"></i> Guardar en Playlist
                    </button>
                </div>
            </div>

            <div class="video-box">
                <video id="videoPlayer" controls></video>
            </div>

            <div id="statusText" class="status-bar">Sistema preparado para transmisión.</div>
        </div>

        <div class="playlist-card">
            <h2 class="playlist-title"><i class="fa-solid fa-list-ul"></i> Lista de Reproducción Diamante</h2>
            <div id="playlistContainer" class="playlist-items">
                </div>
        </div>
    </div>

    <footer class="author-footer">
        Creado por <span>Sebastian Meneses</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <script>
        var video = document.getElementById('videoPlayer');
        var statusText = document.getElementById('statusText');
        var hls;

        // Cargar playlist de localStorage o por defecto
        var playlist = JSON.parse(localStorage.getItem('neon_playlist')) || [
            { 
                name: "Transmisión Principal Inicial", 
                url: document.getElementById('urlInput').value.trim(), 
                image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150" 
            }
        ];

        var currentIndex = -1;

        function renderPlaylist() {
            var container = document.getElementById('playlistContainer');
            container.innerHTML = "";

            if (playlist.length === 0) {
                container.innerHTML = '<div style="color: #64748b; text-align: center; padding: 15px;">No hay elementos en la lista. Agrega uno nuevo.</div>';
                return;
            }

            playlist.forEach((item, index) => {
                var itemDiv = document.createElement('div');
                itemDiv.className = `playlist-item ${index === currentIndex ? 'active' : ''}`;
                
                // Imagen por defecto si no ingresa URL de carátula
                var thumb = item.image && item.image.trim() !== "" ? item.image : "https://via.placeholder.com/150x100/030508/00f2fe?text=NEON";

                itemDiv.innerHTML = `
                    <div class="playlist-item-left">
                        <img src="${thumb}" class="playlist-item-thumb" alt="Carátula" onerror="this.src='https://via.placeholder.com/150x100/030508/00f2fe?text=Error'">
                        <div class="playlist-item-info">
                            <span class="playlist-item-name">${item.name}</span>
                            <span class="playlist-item-url">${item.url}</span>
                        </div>
                    </div>
                    <div class="playlist-actions">
                        <button class="item-btn play-item" onclick="reproducirIndice(${index})" title="Reproducir"><i class="fa-solid fa-play"></i></button>
                        <button class="item-btn delete-item" onclick="eliminarDePlaylist(${index})" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }

        function guardarEnPlaylist() {
            var name = document.getElementById('nameInput').value.trim();
            var url = document.getElementById('urlInput').value.trim();
            var image = document.getElementById('imgInput').value.trim();

            if (!url) {
                alert("Por favor ingresa un enlace multimedia válido.");
                return;
            }

            if (!name) {
                name = "Video sin nombre " + (playlist.length + 1);
            }

            playlist.push({ name: name, url: url, image: image });
            localStorage.setItem('neon_playlist', JSON.stringify(playlist));
            
            document.getElementById('nameInput').value = "";
            document.getElementById('imgInput').value = "";
            renderPlaylist();
            statusText.innerText = `"${name}" guardado en la playlist con carátula.`;
        }

        function eliminarDePlaylist(index) {
            playlist.splice(index, 1);
            localStorage.setItem('neon_playlist', JSON.stringify(playlist));
            if (currentIndex === index) {
                currentIndex = -1;
            } else if (currentIndex > index) {
                currentIndex--;
            }
            renderPlaylist();
        }

        function cargarVideoDesdeInput() {
            var url = document.getElementById('urlInput').value.trim();
            var name = document.getElementById('nameInput').value.trim() || "Reproducción Directa";
            if (!url) {
                alert("Por favor ingresa un enlace válido.");
                return;
            }
            reproducirUrl(url, name);
        }

        function reproducirIndice(index) {
            currentIndex = index;
            var item = playlist[index];
            document.getElementById('urlInput').value = item.url;
            document.getElementById('nameInput').value = item.name;
            document.getElementById('imgInput').value = item.image || "";
            reproducirUrl(item.url, item.name);
            renderPlaylist();
        }

        function reproducirUrl(url, name) {
            statusText.innerText = `Estableciendo conexión con: ${name}...`;

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    if (hls) { hls.destroy(); }
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        statusText.innerText = `Reproduciendo HLS: "${name}"`;
                        video.play().catch(e => {
                            statusText.innerText = "Reproducción pausada por restricciones del navegador. Haz clic en Play.";
                        });
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            statusText.innerText = "Error: El servidor denegó el acceso o el enlace ha expirado.";
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                        statusText.innerText = `Reproduciendo vía soporte nativo: "${name}"`;
                    });
                }
            } else {
                if (hls) { hls.destroy(); }
                video.src = url;
                video.load();
                statusText.innerText = `Cargando archivo MP4: "${name}"...`;
                video.play().then(() => {
                    statusText.innerText = `Reproduciendo MP4: "${name}"`;
                }).catch(e => {
                    statusText.innerText = "Haz clic en reproducir en los controles del video.";
                });
            }
        }

        window.onload = function() {
            renderPlaylist();
            if (playlist.length > 0) {
                reproducirIndice(0);
            }
        };
    </script>
</body>
</html>
